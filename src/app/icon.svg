<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Left Ear -->
  <path d="M 25,45 L 8,12 L 40,30 Z" fill="#FACC15" />
  <path d="M 16,28 L 8,12 L 25,20 Z" fill="#1F2937" />

  <!-- Right Ear -->
  <path d="M 75,45 L 92,12 L 60,30 Z" fill="#FACC15" />
  <path d="M 84,28 L 92,12 L 75,20 Z" fill="#1F2937" />

  <!-- Face Base -->
  <ellipse cx="50" cy="60" rx="42" ry="38" fill="#FACC15" filter="url(#shadow)" />
  
  <!-- Cheeks -->
  <circle cx="20" cy="70" r="7" fill="#EF4444" opacity="0.9"/>
  <circle cx="80" cy="70" r="7" fill="#EF4444" opacity="0.9"/>

  <!-- Nose -->
  <path d="M 48,65 L 52,65 L 50,68 Z" fill="#1F2937" />
  
  <!-- Sunglasses -->
  <g fill="#1F2937">
    <rect x="12" y="48" width="76" height="5" rx="2" />
    <path d="M 15,52 Q 30,52 45,52 L 40,65 Q 25,68 18,65 Z" />
    <path d="M 55,52 Q 70,52 85,52 L 82,65 Q 75,68 60,65 Z" />
  </g>
  
  <!-- Lens Glare -->
  <g fill="#FFFFFF" opacity="0.2">
    <path d="M 20,52 L 28,52 L 23,63 Z" />
    <path d="M 60,52 L 68,52 L 63,63 Z" />
  </g>
</svg>
